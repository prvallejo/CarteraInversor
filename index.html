<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestPro Ultra v4.9</title>
    <link rel="stylesheet" href="style.css?v=1.9">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <header>
        <h1>InvestPro <span>Professional v4.9</span></h1>
        <p>Ingeniería Financiera y Libertad Patrimonial</p>
    </header>

    <div class="container">
        <section class="panel side-controls">
            <div class="input-group">
                <h3>1. Perfil de Ingresos</h3>
                <label>Sueldo Mensual Bruto (CLP):</label>
                <input type="number" id="sueldo" placeholder="Ej: 3200000">
                <label>Años de Proyección:</label>
                <select id="horizonte">
                    <option value="5" selected>5 Años</option>
                    <option value="10">10 Años</option>
                    <option value="20">20 Años</option>
                    <option value="30">30 Años</option>
                </select>
            </div>

            <div class="input-group">
                <div class="check-header">
                    <h3>2. Inversión Inicial</h3>
                    <input type="checkbox" id="check_monto" checked>
                </div>
                <div id="box_monto">
                    <input type="number" id="monto_inicial" placeholder="Monto total inicial">
                </div>
            </div>

            <div class="input-group">
                <div class="check-header">
                    <h3>3. Plan APV</h3>
                    <input type="checkbox" id="check_apv" checked>
                </div>
                <div id="box_apv">
                    <label>Ahorro Mensual:</label>
                    <input type="number" id="apv_monto" placeholder="Ej: 250000">
                    <label>Régimen:</label>
                    <select id="apv_tipo">
                        <option value="A">Régimen A (Bono 15%)</option>
                        <option value="B" selected>Régimen B (Ahorro Tax)</option>
                    </select>
                    <label>Fondo:</label>
                    <select id="apv_fondo">
                        <option value="A">Fondo A (Agresivo - 7%)</option>
                        <option value="C" selected>Fondo C (Moderado - 5%)</option>
                        <option value="E">Fondo E (Conservador - 3%)</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <h3>4. Ahorro en Activos</h3>
                <label>Chile / USA / Money Market:</label>
                <input type="number" id="inv_cl" placeholder="Acciones Chile">
                <input type="number" id="inv_us" placeholder="ETFs USA" style="margin-top:5px">
                <input type="number" id="inv_mm" placeholder="Caja" style="margin-top:5px">
            </div>

            <button type="button" onclick="ejecutarSimulacion()" class="btn-main">CALCULAR ESTRATEGIA</button>
        </section>

        <section class="panel results-area" id="pdf-content">
            <div class="report-header">
                <h2>Reporte de Proyección Financiera</h2>
            </div>
            
            <div class="chart-container">
                <canvas id="projectionChart"></canvas>
            </div>

            <div class="summary-grid">
                <div class="card card-green">
                    <span class="label">Patrimonio Final</span>
                    <span id="res_total" class="value">$0</span>
                </div>
                <div class="card card-blue">
                    <span class="label">Retiro Mensual (4%)</span>
                    <span id="res_retiro" class="value">$0</span>
                </div>
                <div class="card card-orange">
                    <span class="label">Impuestos Totales</span>
                    <span id="res_tax" class="value">$0</span>
                </div>
            </div>

            <div class="table-wrapper">
                <table id="tax-table">
                    <thead>
                        <tr>
                            <th>Año</th>
                            <th>Capital</th>
                            <th>Rentabilidad</th>
                            <th>Tax</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <button type="button" onclick="exportarPDF()" class="btn-pdf">DESCARGAR REPORTE PDF</button>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
