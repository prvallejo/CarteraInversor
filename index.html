<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestPro Ultra 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <header>
        <h1>InvestPro <span>Chile & EE.UU.</span></h1>
        <p>Estrategia Senior para Personas Naturales</p>
    </header>

    <div class="container">
        <section class="panel">
            <h2>Configuración del Plan</h2>
            <form id="pro-form">
                <label>Sueldo Mensual Bruto (CLP):</label>
                <input type="number" id="sueldo" value="3500000">

                <label>Monto Inicial (CLP):</label>
                <input type="number" id="monto" value="10000000">
                
                <label>Horizonte (Años):</label>
                <select id="horizonte">
                    <option value="5">5 Años</option>
                    <option value="10">10 Años</option>
                    <option value="20" selected>20 Años</option>
                    <option value="30">30 Años</option>
                </select>

                <label>Instrumento Principal:</label>
                <select id="instrumento">
                    <option value="banco_chile">Acciones Chile (Crédito IDPC)</option>
                    <option value="schd_us">ETF Dividendos USA (W-8BEN 15%)</option>
                    <option value="money_market">Money Market / DAP</option>
                </select>

                <div class="apv-box">
                    <label>Ahorro APV Mensual (CLP):</label>
                    <input type="number" id="apv_monto" value="150000">
                    <label>Régimen APV:</label>
                    <select id="apv_tipo">
                        <option value="A">Régimen A (Bono 15%)</option>
                        <option value="B">Régimen B (Ahorro Tax)</option>
                    </select>
                </div>

                <div id="recomendacion-zona"></div>

                <button type="button" onclick="ejecutarTodo()" class="btn-main">SIMULAR Y OPTIMIZAR</button>
                <button type="button" onclick="generarPDF()" class="btn-pdf" id="pdf-btn" style="display:none;">DESCARGAR PLAN PDF</button>
            </form>
        </section>

        <section class="panel">
            <h2>Proyección Patrimonial</h2>
            <div class="chart-container">
                <canvas id="projectionChart"></canvas>
            </div>
            <table id="tax-table">
                <thead>
                    <tr>
                        <th>Año</th>
                        <th>Capital Final</th>
                        <th>Dividendos</th>
                        <th>Impuesto</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
