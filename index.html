<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestPro v5.0</title>
    <link rel="stylesheet" href="style.css?v=5.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <header>
        <h1>InvestPro <span>v5.0</span></h1>
        <p>Ingeniería Financiera Aplicada</p>
    </header>

    <div class="container">
        <section class="panel side-controls">
            <div class="input-group">
                <h3>1. Ingresos y Tiempo</h3>
                <label>Sueldo Bruto:</label>
                <input type="number" id="sueldo" placeholder="Ej: 3200000">
                <label>Años:</label>
                <select id="horizonte">
                    <option value="5">5 Años</option>
                    <option value="10" selected>10 Años</option>
                    <option value="20">20 Años</option>
                </select>
            </div>

            <div class="input-group">
                <h3>2. Capital Inicial</h3>
                <input type="number" id="monto_inicial" placeholder="Monto hoy">
            </div>

            <div class="input-group">
                <h3>3. Plan APV</h3>
                <label>Mensual:</label>
                <input type="number" id="apv_monto" placeholder="Ej: 250000">
                <label>Fondo:</label>
                <select id="apv_fondo">
                    <option value="A">Fondo A (7%)</option>
                    <option value="C" selected>Fondo C (5%)</option>
                    <option value="E">Fondo E (3%)</option>
                </select>
                <input type="hidden" id="apv_tipo" value="B">
            </div>

            <button type="button" onclick="ejecutarSimulacion()" class="btn-main">GENERAR REPORTE</button>
        </section>

        <section class="panel results-area" id="pdf-content">
            <h2 style="text-align:center; color:#1e293b;">Proyección de Patrimonio</h2>
            
            <div class="chart-box">
                <canvas id="projectionChart"></canvas>
            </div>

            <div class="summary-grid">
                <div class="card card-green">
                    <span class="label">Patrimonio Final</span>
                    <span id="res_total" class="value">$0</span>
                </div>
                <div class="card card-blue">
                    <span class="label">Retiro (4%)</span>
                    <span id="res_retiro" class="value">$0</span>
                </div>
                <div class="card card-orange">
                    <span class="label">Impuestos</span>
                    <span id="res_tax" class="value">$0</span>
                </div>
            </div>

            <div class="table-wrapper">
                <table id="tax-table">
                    <thead>
                        <tr>
                            <th>Año</th>
                            <th>Capital</th>
                            <th>Renta</th>
                            <th>Tax</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <button type="button" onclick="exportarPDF()" class="btn-pdf">DESCARGAR PDF</button>
        </section>
    </div>
    <script src="app.js?v=5.0"></script>
</body>
    </html>
